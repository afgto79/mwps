<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#fdf6ee">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>MWPS Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" href="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
  <script>
    (function() {
      const op = new URLSearchParams(window.location.search).get('op') || '1';
      const manifest = {
        name: 'MWPS Dashboard',
        short_name: 'MWPS',
        start_url: '/mwps/?op=' + op,
        display: 'standalone',
        background_color: '#fdf6ee',
        theme_color: '#ff6b35',
        icons: [
          { src: 'icon-192.png', sizes: '192x192', type: 'image/png' },
          { src: 'icon-512.png', sizes: '512x512', type: 'image/png' }
        ]
      };
      const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
      document.querySelector('link[rel="manifest"]').href = URL.createObjectURL(blob);
    })();
  </script>
  <script src="config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #fdf6ee;
      --card:         #ffffff;
      --card-alt:     #fff8f0;
      --border:       #f0e6d3;
      --orange:       #ff6b35;
      --orange-light: #fff0e8;
      --yellow:       #fbbf24;
      --green:        #22c55e;
      --red:          #ef4444;
      --text:         #1a1a2e;
      --muted:        #9ca3af;
      --shadow:       0 2px 12px rgba(255,107,53,0.08);
      --nav-h:        56px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito Sans', system-ui, sans-serif;
      font-size: 15px;
      overflow: hidden;
    }

    /* ── Layout ────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    .tab-content {
      flex: 1;
      padding: 14px 16px 0;
      display: none;
      flex-direction: column;
      min-height: 0;
    }
    .tab-content.active { display: flex; }
    #tab-today   { overflow: hidden; }
    #tab-history { overflow-y: auto; padding-bottom: calc(var(--nav-h) + 16px); }

    /* ── Navigation ────────────────────────────────────────────────── */
    nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 420px;
      height: var(--nav-h);
      background: var(--card);
      display: flex;
      border-top: 1px solid var(--border);
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
      z-index: 100;
    }
    nav button {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Nunito Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color .15s;
    }
    nav button.active { color: var(--orange); border-top: 2px solid var(--orange); }

    /* ── Spinner ───────────────────────────────────────────────────── */
    #spinner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 14px;
      color: var(--muted);
      font-family: 'Nunito Sans', sans-serif;
      font-size: 0.9rem;
    }
    .spin {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-msg {
      color: var(--red);
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      text-align: center;
      padding: 24px 20px;
    }

    /* ── Header opérateur ──────────────────────────────────────────── */
    .op-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .op-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff6b35, #fbbf24);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(255,107,53,0.35);
    }
    .op-date {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ── KPI Grid ──────────────────────────────────────────────────── */
    .kpi-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 9px;
      flex-shrink: 0;
    }
    .kpi-card {
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 14px 14px 12px;
      border: 1px solid var(--border);
      animation: slideUp 400ms ease-out both;
    }
    .kpi-card:nth-child(2) { animation-delay: 80ms; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .kpi-label {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .kpi-value {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(1.7rem, 5.5vw, 2.2rem);
      font-weight: 900;
      line-height: 1;
      color: var(--text);
      margin-bottom: 8px;
    }
    .kpi-gauge-track {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .kpi-gauge-fill {
      height: 100%;
      border-radius: 4px;
      width: 0;
      transition: width .6s ease-out;
    }
    .kpi-target {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .kpi-coaching {
      font-family: 'Nunito', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
    }

    /* ── Propositions ──────────────────────────────────────────────── */
    .prop-section {
      background: var(--card-alt);
      border-radius: 12px;
      padding: 11px 14px 12px;
      margin-bottom: 9px;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .prop-row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }
    .prop-icon {
      color: var(--orange);
      font-size: 0.7rem;
      margin-right: 8px;
      flex-shrink: 0;
    }
    .prop-label {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      flex: 1;
    }
    .prop-count {
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }
    .prop-track {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .prop-fill {
      height: 100%;
      border-radius: 3px;
      width: 0;
      transition: width .5s ease-out;
    }

    /* ── Streak pill ───────────────────────────────────────────────── */
    .streak-pill {
      background: rgba(251,191,36,0.15);
      border: 1px solid rgba(251,191,36,0.4);
      border-radius: 20px;
      padding: 9px 16px;
      margin-bottom: 9px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      flex-shrink: 0;
    }
    .streak-pulse { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.02); }
    }

    /* ── Données manquantes ────────────────────────────────────── */
    .data-warn {
      background: rgba(245,158,11,0.12);
      border: 1px solid rgba(245,158,11,0.45);
      border-radius: 20px;
      padding: 8px 14px;
      margin-bottom: 9px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: #92400e;
      flex-shrink: 0;
    }

    /* ── Classement équipe ─────────────────────────────────────────── */
    .team-section {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
      padding-bottom: calc(var(--nav-h) + 8px);
    }
    .team-card {
      background: var(--card);
      border-radius: 16px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .team-title {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .team-row {
      display: flex;
      align-items: center;
      padding: 6px 8px;
      border-radius: 10px;
      margin-bottom: 3px;
      gap: 8px;
    }
    .team-row.team-self {
      background: var(--orange-light);
      border-left: 3px solid var(--orange);
    }
    .team-rank {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 0.75rem;
      color: var(--muted);
      width: 18px;
      flex-shrink: 0;
    }
    .team-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Nunito', sans-serif;
      font-size: 0.65rem;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }
    .team-bar-col { flex: 1; min-width: 0; }
    .team-bar-track {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .team-bar-fill { height: 100%; border-radius: 3px; }
    .team-val {
      font-family: 'Nunito', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      width: 36px;
      text-align: right;
      flex-shrink: 0;
    }
    .team-emoji { font-size: 0.85rem; width: 18px; text-align: center; flex-shrink: 0; }

    .sig-green  { color: var(--green); }
    .sig-orange { color: var(--orange); }
    .sig-red    { color: var(--red); }
    .sig-none   { color: var(--muted); }

    /* ── Pop-up ────────────────────────────────────────────────────── */
    #popup-overlay {
      display: none;
      position: fixed; inset: 0;
      backdrop-filter: blur(6px);
      background: rgba(253,246,238,0.85);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #popup-overlay.show { display: flex; }
    #popup-card {
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(255,107,53,0.2);
      border: 2px solid var(--orange);
      max-width: 300px;
      width: 90%;
      padding: 32px 24px;
      text-align: center;
      animation: popIn 300ms cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    #popup-icon {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    #popup-msg {
      font-family: 'Nunito', sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.3;
    }
    #popup-sub {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 24px;
      min-height: 0;
    }
    #popup-ok {
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px;
      width: 100%;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
    }

    /* ── Historique ────────────────────────────────────────────────── */
    .chart-wrap {
      background: var(--card);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .chart-title {
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
    }
    canvas { display: block; width: 100% !important; }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Spinner / erreur ── -->
  <div id="spinner">
    <div class="spin"></div>
    Chargement…
  </div>
  <div id="error-msg" style="display:none"></div>

  <!-- ── Onglet Aujourd'hui ── -->
  <div id="tab-today" class="tab-content">

    <div class="op-header">
      <div class="op-avatar" id="op-name">—</div>
      <span class="op-date" id="op-date">—</span>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card" id="kpi-pmho-box">
        <div class="kpi-label">💰 Panier moyen</div>
        <div class="kpi-value" id="kpi-pmho">—</div>
        <div class="kpi-gauge-track"><div class="kpi-gauge-fill" id="kpi-pmho-bar"></div></div>
        <div class="kpi-target" id="kpi-pmho-cible"></div>
        <div class="kpi-coaching" id="kpi-pmho-coaching"></div>
      </div>
      <div class="kpi-card" id="kpi-pca-box">
        <div class="kpi-label">🤝 Conseils</div>
        <div class="kpi-value" id="kpi-pca">—</div>
        <div class="kpi-gauge-track"><div class="kpi-gauge-fill" id="kpi-pca-bar"></div></div>
        <div class="kpi-target" id="kpi-pca-cible"></div>
        <div class="kpi-coaching" id="kpi-pca-coaching"></div>
      </div>
    </div>

    <div class="prop-section" id="prop-section" style="display:none">
      <div class="prop-row">
        <span class="prop-icon">◆</span>
        <span class="prop-label">Propositions</span>
        <span class="prop-count" id="prop-count">—</span>
      </div>
      <div class="prop-track"><div class="prop-fill" id="prop-fill"></div></div>
    </div>

    <div class="streak-pill" id="streak-pill" style="display:none"></div>

    <div class="data-warn" id="data-warn" style="display:none"></div>

    <div class="team-section" id="team-section" style="display:none">
      <div class="team-card">
        <div class="team-title">Panier moyen · Mois en cours</div>
        <div id="team-list"></div>
      </div>
    </div>

  </div>

  <!-- ── Onglet Historique ── -->
  <div id="tab-history" class="tab-content">
    <div class="chart-wrap">
      <div class="chart-title">PMHO — 365 jours</div>
      <canvas id="chart-pmho" height="180"></canvas>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">Volume PC (PCA+PCR) — 365 jours</div>
      <canvas id="chart-pca" height="180"></canvas>
    </div>
  </div>

  <!-- ── Navigation ── -->
  <nav>
    <button id="nav-today" class="active" onclick="switchTab('today')">Aujourd'hui</button>
    <button id="nav-history" onclick="switchTab('history')">Historique</button>
  </nav>
</div>

<!-- ── Pop-up ── -->
<div id="popup-overlay">
  <div id="popup-card">
    <div id="popup-icon"></div>
    <div id="popup-msg"></div>
    <div id="popup-sub"></div>
    <button id="popup-ok" onclick="closePopup()">Super !</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
// Utilitaires Sheets
// ═══════════════════════════════════════════════════════════════════

function normalizeDate(v) {
  const s = String(v).trim();
  // Format français DD/MM/YYYY → YYYY-MM-DD
  const mFr = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (mFr) return `${mFr[3]}-${mFr[2]}-${mFr[1]}`;
  // Sérial Excel/Sheets → YYYY-MM-DD
  const n = Number(s);
  if (!isNaN(n) && n > 40000) {
    const d = new Date((n - 25569) * 86400 * 1000);
    return d.toISOString().slice(0, 10);
  }
  return s;
}

const DATE_FIELDS = ['date'];

async function fetchSheet(range) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEETS_ID}/values/${encodeURIComponent(range)}?key=${CONFIG.API_KEY}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`Sheets API ${resp.status} pour ${range}`);
  const json = await resp.json();
  const rows = json.values || [];
  if (rows.length < 2) return [];
  const headers = rows[0];
  return rows.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = row[i] ?? ''; });
    DATE_FIELDS.forEach(f => { if (f in obj) obj[f] = normalizeDate(obj[f]); });
    return obj;
  });
}

function parseFloat2(v) {
  const f = parseFloat(v);
  return isNaN(f) ? null : f;
}
function parseInt2(v) {
  const i = parseInt(v);
  return isNaN(i) ? null : i;
}

// ═══════════════════════════════════════════════════════════════════
// Navigation onglets
// ═══════════════════════════════════════════════════════════════════

let historyInitialized = false;

function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  document.getElementById(`nav-${name}`).classList.add('active');
  if (name === 'history' && !historyInitialized && histData) {
    renderHistory();
    historyInitialized = true;
  }
}

// ═══════════════════════════════════════════════════════════════════
// Signal
// ═══════════════════════════════════════════════════════════════════

function sigClass(value, cible) {
  if (value === null || cible === null || cible === 0) return 'sig-none';
  const ratio = value / cible;
  if (ratio >= 1)   return 'sig-green';
  if (ratio >= 0.9) return 'sig-orange';
  return 'sig-red';
}

function sigEmoji(cls) {
  return { 'sig-green': '🟢', 'sig-orange': '🟠', 'sig-red': '🔴', 'sig-none': '⚫' }[cls] ?? '';
}

// Couleur jauge : seuil 5% (plus fin que sigClass) — utilisé pour valeurs jour
function gaugeColor(value, cible) {
  if (value === null || cible === null || cible === 0) return 'var(--muted)';
  const ratio = value / cible;
  if (ratio >= 1)    return 'var(--green)';
  if (ratio >= 0.95) return 'var(--orange)';
  return 'var(--red)';
}

// Couleur trajectoire mensuelle — seuils 95% / 80%
function trajColor(ratio) {
  if (ratio === null) return 'var(--muted)';
  if (ratio >= 0.95) return 'var(--green)';
  if (ratio >= 0.80) return 'var(--orange)';
  return 'var(--red)';
}

// ═══════════════════════════════════════════════════════════════════
// Formatage
// ═══════════════════════════════════════════════════════════════════

function fmtPMHO(v) {
  if (v === null) return '—';
  return v.toFixed(2).replace('.', ',') + ' €';
}
function fmtPct(v) {
  if (v === null) return '—';
  return Math.round(v * 100) + '%';
}
function fmtDate(iso) {
  if (!iso) return '—';
  const parts = iso.split('-');
  if (parts.length < 3) return iso;
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  if (iso === yesterday.toISOString().slice(0, 10)) return `Hier, ${parts[2]}/${parts[1]} 🌅`;
  return `Le ${parts[2]}/${parts[1]}`;
}

// ═══════════════════════════════════════════════════════════════════
// Messages coaching
// ═══════════════════════════════════════════════════════════════════

function coachingPMHO(pmho, cible) {
  if (pmho === null) return 'Pas de vente comptoir ce jour.';
  if (cible === null || cible === 0) return '';
  const ratio = pmho / cible;
  if (ratio >= 1) return '🟢 Bien joué, objectif atteint !';
  const manque = (cible - pmho).toFixed(2).replace('.', ',');
  const gap = (1 - ratio) * 100;
  if (gap < 5)  return `🟠 Tout proche ! Plus que ${manque}€ à faire.`;
  if (gap < 15) return `🟠 Il te manque ${manque}€ — tu peux y arriver.`;
  return '🔴 Journée difficile. Demain c\'est reparti !';
}

function coachingPCA(taux, cible) {
  if (taux === null) return 'Aucune proposition enregistrée.';
  if (cible === null || cible === 0) return '';
  const ratio = taux / cible;
  if (ratio >= 1) return '🟢 Objectif atteint !';
  const pct = Math.round((cible - taux) * 100);
  const gap = (1 - ratio) * 100;
  if (gap < 5)  return `🟠 Presque ! ${pct}% de marge.`;
  if (gap < 15) return `🟠 ${pct}% sous la cible. Propose à chaque passage.`;
  return '🔴 Pense à proposer systématiquement.';
}

// ═══════════════════════════════════════════════════════════════════
// Confettis + couleurs opérateurs
// ═══════════════════════════════════════════════════════════════════

const OP_COLORS = {};  // chargé dynamiquement depuis la feuille `operators`

function maybeConfetti(flagRow, todayStr) {
  if (!flagRow || !todayStr) return;
  const key = `mwps_confetti_${opId}_${todayStr}`;
  if (localStorage.getItem(key)) return;
  const isRecord  = flagRow.record_PMHO === 'True' || flagRow.record_taux_PCA === 'True';
  const isStreak7 = parseInt2(flagRow.streak_PCA) >= 7;
  if (isRecord || isStreak7) {
    localStorage.setItem(key, '1');
    if (typeof confetti === 'function') {
      confetti({
        particleCount: 120,
        spread: 70,
        origin: { y: 0.4 },
        colors: ['#ff6b35', '#fbbf24', '#22c55e', '#ffffff'],
      });
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
// Pop-up gamification
// ═══════════════════════════════════════════════════════════════════

const POPUP_RULES = [
  { flag: r => r.record_PMHO === 'True',                  icon: '🏆', msg: 'Record perso PMHO !' },
  { flag: r => r.record_taux_PCA === 'True',              icon: '🏆', msg: 'Record perso PCA !' },
  { flag: r => parseInt2(r.streak_PCA)  >= 7,             icon: '🔥', msg: '7 jours de suite au-dessus de la cible PCA !' },
  { flag: r => parseInt2(r.streak_PMHO) >= 7,             icon: '🔥', msg: '7 jours de suite au-dessus de la cible PMHO !' },
  { flag: r => parseInt2(r.streak_PCA)  >= 3,             icon: '🔥', msg: '3 jours de suite au-dessus de la cible PCA !' },
  { flag: r => parseInt2(r.streak_PMHO) >= 3,             icon: '🔥', msg: '3 jours de suite au-dessus de la cible PMHO !' },
  { flag: r => r.best_team_PCA === 'True',                icon: '⭐', msg: 'Meilleur taux équipe aujourd\'hui !' },
  { flag: r => r.progression_PCA === 'True',              icon: '📈', msg: 'PCA en progression cette semaine !' },
  { flag: r => r.objectif_volume_atteint === 'True',      icon: '💼', msg: 'Objectif volume de propositions atteint !' },
  { flag: r => r.objectif_mensuel_PCA_atteint === 'True', icon: '✅', msg: 'Objectif mensuel PCA atteint !' },
];

function maybeShowPopup(flagRow, todayStr) {
  const key = `mwps_popup_${opId}_${todayStr}`;
  if (localStorage.getItem(key)) return;
  for (const rule of POPUP_RULES) {
    if (flagRow && rule.flag(flagRow)) {
      document.getElementById('popup-icon').textContent = rule.icon;
      document.getElementById('popup-msg').textContent  = rule.msg;
      document.getElementById('popup-sub').textContent  = '';
      document.getElementById('popup-overlay').classList.add('show');
      localStorage.setItem(key, '1');
      return;
    }
  }
}

function closePopup() {
  document.getElementById('popup-overlay').classList.remove('show');
}

// ═══════════════════════════════════════════════════════════════════
// Données manquantes
// ═══════════════════════════════════════════════════════════════════

function getMissingDates(allData, opId) {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 30);
  const cutStr = cutoff.toISOString().slice(0, 10);

  // Jours ouvrés = dates où au moins un opérateur a des ventes
  const workingDays = new Set(
    allData.filter(r => r.date >= cutStr && parseInt2(r.nb_ventes_comptoir_j) > 0).map(r => r.date)
  );
  // Jours où cet opérateur a une ligne (ventes = 0 = congé, pas manquant)
  const opDays = new Set(
    allData.filter(r => r.operateur_id === opId && r.date >= cutStr).map(r => r.date)
  );
  return [...workingDays].filter(d => !opDays.has(d)).sort().reverse();
}

function renderDataWarn(allData, opId) {
  const missing = getMissingDates(allData, opId);
  const el = document.getElementById('data-warn');
  if (!missing.length) { el.style.display = 'none'; return; }

  const fmt    = d => { const p = d.split('-'); return `${p[2]}/${p[1]}`; };
  const shown  = missing.slice(0, 3).map(fmt);
  const suffix = missing.length > 3 ? ` +${missing.length - 3}` : '';
  el.textContent = `⚠ Données manquantes : ${shown.join(', ')}${suffix}`;
  el.style.display = 'block';
}

// ═══════════════════════════════════════════════════════════════════
// Onglet Aujourd'hui
// ═══════════════════════════════════════════════════════════════════

function renderToday(todayData, flagRow, targetRow, teamData, targetsAll) {
  const opInitials = CONFIG.OPERATORS[opId] || opId;
  const todayStr   = todayData ? todayData.date : '';

  document.getElementById('op-name').textContent = opInitials;
  document.getElementById('op-date').textContent = fmtDate(todayStr);

  // ── PMHO ──
  const pmho      = parseFloat2(todayData?.PMHO);
  const ciblePmho = parseFloat2(targetRow?.cible_PMHO);

  document.getElementById('kpi-pmho').textContent = fmtPMHO(pmho);
  const pmhoBar   = document.getElementById('kpi-pmho-bar');
  const trajPmho  = parseFloat2(String(flagRow?.traj_ratio_PMHO ?? '').replace(',', '.'));
  if (trajPmho !== null) {
    pmhoBar.style.width      = Math.min(100, trajPmho * 100) + '%';
    pmhoBar.style.background = trajColor(trajPmho);
  } else {
    pmhoBar.style.width      = (pmho !== null && ciblePmho > 0) ? Math.min(100, pmho / ciblePmho * 100) + '%' : '0%';
    pmhoBar.style.background = gaugeColor(pmho, ciblePmho);
  }
  document.getElementById('kpi-pmho-cible').textContent =
    ciblePmho !== null ? `Cible ${fmtPMHO(ciblePmho)}` : '';
  document.getElementById('kpi-pmho-coaching').textContent = coachingPMHO(pmho, ciblePmho);

  // ── PCA ──
  const taux     = parseFloat2(todayData?.taux_acceptation);
  const ciblePca = parseFloat2(targetRow?.cible_taux_PCA);

  document.getElementById('kpi-pca').textContent = fmtPct(taux);
  const pcaBar   = document.getElementById('kpi-pca-bar');
  const trajPca  = parseFloat2(String(flagRow?.traj_ratio_PCA ?? '').replace(',', '.'));
  if (trajPca !== null) {
    pcaBar.style.width      = Math.min(100, trajPca * 100) + '%';
    pcaBar.style.background = trajColor(trajPca);
  } else {
    pcaBar.style.width      = (taux !== null && ciblePca > 0) ? Math.min(100, taux / ciblePca * 100) + '%' : '0%';
    pcaBar.style.background = gaugeColor(taux, ciblePca);
  }
  document.getElementById('kpi-pca-cible').textContent =
    ciblePca !== null ? `Cible ${fmtPct(ciblePca)}` : '';
  document.getElementById('kpi-pca-coaching').textContent = coachingPCA(taux, ciblePca);

  // ── Propositions ──
  const nbPca    = parseInt2(todayData?.nb_PCA) ?? 0;
  const nbPcr    = parseInt2(todayData?.nb_PCR) ?? 0;
  const volJ     = nbPca + nbPcr;
  const cibleVol = parseInt2(targetRow?.cible_nb_propositions_j);
  const propEl   = document.getElementById('prop-section');

  if (volJ > 0 || (cibleVol !== null && cibleVol > 0)) {
    const propPct   = (cibleVol > 0) ? Math.min(100, volJ / cibleVol * 100) : 0;
    const propColor = (cibleVol !== null && cibleVol > 0 && volJ >= cibleVol)
      ? 'var(--green)' : 'var(--orange)';
    document.getElementById('prop-count').textContent =
      (cibleVol !== null && cibleVol > 0) ? `${volJ} / ${cibleVol}` : `${volJ}`;
    const fill = document.getElementById('prop-fill');
    fill.style.width      = propPct + '%';
    fill.style.background = propColor;
    propEl.style.display  = 'block';
  } else {
    propEl.style.display = 'none';
  }

  // ── Streak ──
  const streakPca  = parseInt2(flagRow?.streak_PCA)  ?? 0;
  const streakPmho = parseInt2(flagRow?.streak_PMHO) ?? 0;
  const streakEl   = document.getElementById('streak-pill');
  if (streakPca > 0 || streakPmho > 0) {
    const msgs = [];
    if (streakPca > 0) {
      const icon = streakPca >= 3 ? '🔥' : '✨';
      msgs.push(`${icon} ${streakPca}j PCA au-dessus de la cible`);
    }
    if (streakPmho > 0) {
      const icon = streakPmho >= 3 ? '🔥' : '✨';
      msgs.push(`${icon} ${streakPmho}j PMHO au-dessus de la cible`);
    }
    streakEl.textContent = msgs.join(' · ');
    const maxStreak = Math.max(streakPca, streakPmho);
    streakEl.className   = 'streak-pill' + (maxStreak >= 7 ? ' streak-pulse' : '');
    streakEl.style.display = 'block';
  } else {
    streakEl.style.display = 'none';
  }

  // ── Équipe ──
  renderTeam(teamData, todayStr, opId, targetRow, targetsAll);

  // ── Pop-up + confettis ──
  maybeShowPopup(flagRow, todayStr);
  maybeConfetti(flagRow, todayStr);
}

function renderTeam(teamData, todayStr, currentOpId, targetRow, targetsAll) {
  const section = document.getElementById('team-section');
  const listEl  = document.getElementById('team-list');
  const ym      = todayStr ? todayStr.slice(0, 7) : '';

  // Moyenne PMHO mensuelle par opérateur
  const opData = Object.keys(CONFIG.OPERATORS).map(id => {
    const rows   = teamData.filter(r => r.operateur_id === id && r.date.startsWith(ym) && parseInt2(r.nb_ventes_comptoir_j) > 0);
    const vals   = rows.map(r => parseFloat2(r.PMHO)).filter(v => v !== null);
    const avg    = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
    const t      = targetsAll?.find(r => String(r.operateur_id) === String(id) && r.annee_mois === ym);
    const cible  = parseFloat2(t?.cible_PMHO) ?? parseFloat2(targetRow?.cible_PMHO);
    return { id, avg, cible };
  }).filter(o => o.avg !== null);

  if (opData.length <= 1) { section.style.display = 'none'; return; }

  opData.sort((a, b) => b.avg - a.avg);
  const maxAvg = opData[0].avg;

  let html = '';
  opData.forEach((o, i) => {
    const opInit  = CONFIG.OPERATORS[o.id];
    const isSelf  = o.id === currentOpId;
    const barW    = maxAvg > 0 ? Math.round((o.avg / maxAvg) * 100) : 0;
    const color   = gaugeColor(o.avg, o.cible);
    const opColor = OP_COLORS[o.id] || 'var(--muted)';
    html += `<div class="team-row${isSelf ? ' team-self' : ''}">
      <span class="team-rank">${i + 1}.</span>
      <span class="team-avatar" style="background:${opColor}">${opInit}</span>
      <div class="team-bar-col">
        <div class="team-bar-track">
          <div class="team-bar-fill" style="width:${barW}%;background:${color}"></div>
        </div>
      </div>
      <span class="team-val" style="color:${color}">${fmtPMHO(o.avg)}</span>
    </div>`;
  });

  listEl.innerHTML = html;
  section.style.display = 'block';
}

// ═══════════════════════════════════════════════════════════════════
// Onglet Historique
// ═══════════════════════════════════════════════════════════════════

let histData    = null;
let histTargets = null;
let chartPmho   = null;
let chartPca    = null;

function renderHistory() {
  if (!histData) return;

  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 365);
  const cutStr = cutoff.toISOString().slice(0, 10);

  const rows = histData
    .filter(r => r.operateur_id === opId && r.date >= cutStr && parseInt2(r.nb_ventes_comptoir_j) > 0)
    .sort((a, b) => a.date.localeCompare(b.date));

  const labels   = rows.map(r => r.date);
  const pmhoVals = rows.map(r => parseFloat2(r.PMHO));
  const pcaVals  = rows.map(r => {
    const pca = parseInt2(r.nb_PCA);
    const pcr = parseInt2(r.nb_PCR);
    return (pca === null && pcr === null) ? null : (pca ?? 0) + (pcr ?? 0);
  });

  function targetForDate(dateStr, kpi) {
    if (!histTargets) return null;
    const ym = dateStr.slice(0, 7);
    const t  = histTargets.find(r => r.annee_mois === ym && String(r.operateur_id) === String(opId));
    if (!t) return null;
    return kpi === 'pmho' ? parseFloat2(t.cible_PMHO) : parseFloat2(t.cible_nb_propositions_j);
  }

  function colorForPoint(v, cible) {
    if (v === null || cible === null || cible === 0) return 'rgba(156,163,175,0.6)';
    if (v >= cible)       return '#22c55e';
    if (v >= cible * 0.9) return '#ff6b35';
    return '#ef4444';
  }

  function makeChart(canvasId, labels, mainVals, cibleVals, labelMain, labelCible, fmtY) {
    const ctx         = document.getElementById(canvasId).getContext('2d');
    const pointColors = mainVals.map((v, i) => colorForPoint(v, cibleVals[i]));

    return new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: labelMain,
            data: mainVals,
            borderColor: '#ff6b35',
            backgroundColor: 'transparent',
            pointBackgroundColor: pointColors,
            pointRadius: 2,
            pointHoverRadius: 5,
            borderWidth: 2,
            tension: 0.3,
            segment: {
              borderColor: ctx2 => colorForPoint(mainVals[ctx2.p0DataIndex], cibleVals[ctx2.p0DataIndex]),
            },
            spanGaps: false,
          },
          {
            label: labelCible,
            data: cibleVals,
            borderColor: '#fbbf24',
            borderDash: [6, 4],
            pointRadius: 0,
            borderWidth: 1.5,
            tension: 0,
            spanGaps: true,
          },
        ],
      },
      options: {
        responsive: true,
        animation: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#ffffff',
            borderColor: '#f0e6d3',
            borderWidth: 1,
            titleColor: '#9ca3af',
            bodyColor: '#1a1a2e',
            titleFont: { family: 'Nunito Sans', size: 11 },
            bodyFont:  { family: 'Nunito Sans', size: 12 },
            callbacks: {
              label: item => `${item.dataset.label}: ${fmtY(item.raw)}`,
            },
          },
        },
        scales: {
          x: {
            type: 'category',
            ticks: {
              color: '#9ca3af',
              maxTicksLimit: 8,
              font: { size: 10, family: 'Nunito Sans' },
              maxRotation: 0,
            },
            grid: { color: '#f0e6d3' },
          },
          y: {
            ticks: {
              color: '#9ca3af',
              font: { size: 10, family: 'Nunito Sans' },
              callback: v => fmtY(v),
            },
            grid: { color: '#f0e6d3' },
          },
        },
      },
    });
  }

  const pmhoCibles = labels.map(d => targetForDate(d, 'pmho'));
  const pcaCibles  = labels.map(d => targetForDate(d, 'pca'));

  if (chartPmho) chartPmho.destroy();
  if (chartPca)  chartPca.destroy();

  chartPmho = makeChart('chart-pmho', labels, pmhoVals, pmhoCibles, 'PMHO',     'Cible', v => v !== null ? v.toFixed(2) + ' €' : '—');
  chartPca  = makeChart('chart-pca',  labels, pcaVals,  pcaCibles,  'Volume PC', 'Cible', v => v !== null ? v + ' PC' : '—');
}

// ═══════════════════════════════════════════════════════════════════
// Bootstrap principal
// ═══════════════════════════════════════════════════════════════════

const _urlOp = new URLSearchParams(window.location.search).get('op');
if (!_urlOp) {
  const saved = localStorage.getItem('mwps_last_op');
  if (saved) {
    window.location.replace('?op=' + saved);
    throw new Error('redirect');
  }
}
const opId = _urlOp || '1';

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

async function init() {
  try {
    // Charger les opérateurs actifs depuis Sheets en premier
    // (reset obligatoire : config.js peut être en cache avec d'anciens opérateurs)
    const opsRows = await fetchSheet('operators');
    Object.keys(CONFIG.OPERATORS).forEach(k => delete CONFIG.OPERATORS[k]);
    Object.keys(OP_COLORS).forEach(k => delete OP_COLORS[k]);
    opsRows.filter(r => r.actif === 'TRUE' || r.actif === 'true' || r.actif === '1').forEach(r => {
      CONFIG.OPERATORS[r.id] = r.initials;
      OP_COLORS[r.id]        = r.color || '#94a3b8';
    });

    if (!CONFIG.OPERATORS[opId]) {
      showError(`Opérateur inconnu : ?op=${opId}`);
      return;
    }

    const [dataAll, flagsAll, targetsAll] = await Promise.all([
      fetchSheet('data!A:H'),
      fetchSheet('flags!A:R'),
      fetchSheet('targets!A:G'),
    ]);

    // Normalise les décimales en locale française (Sheets renvoie "0,3333" → "0.3333")
    dataAll.forEach(r => {
      r.PMHO             = String(r.PMHO).replace(',', '.');
      r.taux_acceptation = String(r.taux_acceptation).replace(',', '.');
    });

    const opRows = dataAll
      .filter(r => r.operateur_id === opId && parseInt2(r.nb_ventes_comptoir_j) > 0);
    opRows.sort((a, b) => b.date.localeCompare(a.date));
    const todayStr  = opRows[0]?.date ?? '';
    const todayData = opRows[0] ?? null;

    const opFlags = flagsAll.filter(r => r.operateur_id === opId);
    opFlags.sort((a, b) => b.date.localeCompare(a.date));
    const flagRow = opFlags.filter(r => r.date === todayStr)[0] ?? opFlags[0] ?? null;

    function excelSerialToYearMonth(serial) {
      const d = new Date((serial - 25569) * 86400 * 1000);
      const y = d.getUTCFullYear();
      const m = String(d.getUTCMonth() + 1).padStart(2, '0');
      return `${y}-${m}`;
    }
    function normalizeYearMonth(v) {
      const s = String(v).trim();
      // Format compact YYYYMM (ex : '202604') → '2026-04'
      if (/^\d{6}$/.test(s)) return `${s.slice(0, 4)}-${s.slice(4, 6)}`;
      // Serial Excel 5 chiffres (ex : 46118) → 'YYYY-MM'
      const n = Number(s);
      if (!isNaN(n) && n > 40000 && n < 100000) return excelSerialToYearMonth(n);
      return s;
    }
    targetsAll.forEach(r => {
      r.annee_mois              = normalizeYearMonth(r.annee_mois);
      r.cible_PMHO              = parseFloat(String(r.cible_PMHO).replace(',', '.'));
      r.cible_taux_PCA          = parseFloat(String(r.cible_taux_PCA).replace(',', '.'));
      r.cible_nb_propositions_j = parseInt(r.cible_nb_propositions_j);
    });

    const ym        = todayStr.slice(0, 7);
    const targetRow = targetsAll.find(
      r => String(r.operateur_id) === String(opId) && r.annee_mois === ym
    ) ?? null;

    histData    = dataAll;
    histTargets = targetsAll;

    localStorage.setItem('mwps_last_op', opId);

    document.getElementById('spinner').style.display = 'none';
    document.getElementById('tab-today').classList.add('active');

    renderToday(todayData, flagRow, targetRow, dataAll, targetsAll);
    renderDataWarn(dataAll, opId);

  } catch (err) {
    showError('Données indisponibles — ' + err.message);
  }
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js').catch(() => {});
}

init();
</script>
