<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0f1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>MWPS Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" href="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
  <script src="config.js"></script>
  <style>
    /* ── Reset & base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --card:     #1c1f26;
      --card2:    #252830;
      --text:     #f0f0f0;
      --muted:    #8b8fa8;
      --green:    #22c55e;
      --orange:   #f59e0b;
      --red:      #ef4444;
      --nav-h:    56px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px;
      overflow: hidden;
    }

    /* ── Layout ────────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    .tab-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px calc(var(--nav-h) + 12px);
      display: none;
    }
    .tab-content.active { display: flex; flex-direction: column; }

    /* Onglet Aujourd'hui : répartir l'espace sans scroll */
    #tab-today { overflow-y: hidden; }
    #tab-today .kpi-grid { flex-shrink: 0; }
    #tab-today .badges   { flex-shrink: 0; }
    #tab-today #team-section { flex: 1; overflow-y: auto; min-height: 0; }

    /* ── Bottom nav ────────────────────────────────────────────────────── */
    nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 420px;
      height: var(--nav-h);
      background: var(--card);
      display: flex;
      border-top: 1px solid #2a2d36;
      z-index: 100;
    }
    nav button {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: color .15s;
      letter-spacing: .03em;
    }
    nav button.active { color: var(--text); border-top: 2px solid var(--green); }

    /* ── Cards ─────────────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    /* ── Header opérateur ──────────────────────────────────────────────── */
    .op-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    .op-avatar {
      width: 40px; height: 40px;
      background: var(--card2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800;
      flex-shrink: 0;
    }
    .op-date { font-size: 13px; color: var(--muted); }

    /* ── KPI grid ──────────────────────────────────────────────────────── */
    .kpi-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .kpi-box {
      background: var(--card2);
      border-radius: 10px;
      padding: 12px 14px;
      border-left: 4px solid transparent;
      transition: border-color .3s;
    }
    .kpi-box.sig-green  { border-left-color: var(--green); }
    .kpi-box.sig-orange { border-left-color: var(--orange); }
    .kpi-box.sig-red    { border-left-color: var(--red); }
    .kpi-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .kpi-value {
      font-size: 32px;
      font-weight: 700;
      line-height: 1.1;
    }
    .kpi-cible {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }
    .kpi-delta {
      font-size: 12px;
      font-weight: 600;
      margin-top: 5px;
    }
    .kpi-bar-track {
      height: 3px;
      background: #2a2d36;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .kpi-bar {
      height: 100%;
      border-radius: 2px;
      width: 0;
      transition: width .4s ease;
    }
    .kpi-box.sig-green  .kpi-bar { background: var(--green); }
    .kpi-box.sig-orange .kpi-bar { background: var(--orange); }
    .kpi-box.sig-red    .kpi-bar { background: var(--red); }
    .kpi-box.sig-none   .kpi-bar { background: var(--muted); }
    .sig-green  { color: var(--green); }
    .sig-orange { color: var(--orange); }
    .sig-red    { color: var(--red); }
    .sig-none   { color: var(--muted); }

    /* ── Streak / propositions ─────────────────────────────────────────── */
    .badges { display: flex; flex-direction: column; gap: 7px; margin-bottom: 10px; }
    .badge-row {
      background: var(--card2);
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 600;
      border-left: 3px solid var(--muted);
    }
    .badge-row.badge-streak       { border-left-color: var(--orange); }
    .badge-row.badge-vol-green    { border-left-color: var(--green); }
    .badge-row.badge-vol-orange   { border-left-color: var(--orange); }
    .badge-row.badge-vol-red      { border-left-color: var(--red); }

    /* ── Classement équipe ─────────────────────────────────────────────── */
    .team-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .team-row {
      display: flex;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #2a2d36;
      font-size: 13px;
    }
    .team-row:last-child { border-bottom: none; }
    .team-rank { width: 22px; color: var(--muted); font-size: 12px; }
    .team-op   { flex: 1; font-weight: 700; }
    .team-val  { width: 40px; text-align: right; font-weight: 600; }
    .team-bar-wrap {
      width: 44px; height: 5px;
      background: #2a2d36;
      border-radius: 3px;
      overflow: hidden;
      margin-left: 8px;
      align-self: center;
      flex-shrink: 0;
    }
    .team-bar-fill { height: 100%; border-radius: 3px; }
    .team-sig  { width: 18px; text-align: right; margin-left: 4px; font-size: 13px; }

    /* ── Spinner ───────────────────────────────────────────────────────── */
    #spinner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 14px;
      color: var(--muted);
      font-size: 13px;
    }
    .spin {
      width: 32px; height: 32px;
      border: 3px solid #2a2d36;
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-msg { color: var(--red); font-size: 14px; text-align: center; padding: 20px; }

    /* ── Pop-up ────────────────────────────────────────────────────────── */
    #popup-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.72);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #popup-overlay.show { display: flex; }
    #popup-card {
      background: var(--card);
      border-radius: 16px;
      padding: 28px 24px 20px;
      max-width: 320px;
      width: 90%;
      text-align: center;
      animation: popIn .2s ease-out;
    }
    @keyframes popIn {
      from { transform: scale(.88); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    #popup-icon  { font-size: 48px; margin-bottom: 10px; }
    #popup-msg   { font-size: 17px; font-weight: 700; margin-bottom: 20px; line-height: 1.3; }
    #popup-ok {
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 10px 32px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ── Historique ────────────────────────────────────────────────────── */
    .chart-wrap {
      background: var(--card);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .chart-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .05em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    canvas { display: block; width: 100% !important; }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Spinner / erreur ── -->
  <div id="spinner">
    <div class="spin"></div>
    Chargement…
  </div>
  <div id="error-msg" style="display:none"></div>

  <!-- ── Onglet 1 : Aujourd'hui ── -->
  <div id="tab-today" class="tab-content">

    <!-- En-tête opérateur -->
    <div class="op-header">
      <div class="op-avatar" id="op-name">—</div>
      <span class="op-date" id="op-date">—</span>
    </div>

    <!-- KPIs PMHO / PCA -->
    <div class="kpi-grid">
      <div class="kpi-box" id="kpi-pmho-box">
        <div class="kpi-label">PMHO</div>
        <div class="kpi-value" id="kpi-pmho">—</div>
        <div class="kpi-cible" id="kpi-pmho-cible"></div>
        <div class="kpi-delta" id="kpi-pmho-delta"></div>
        <div class="kpi-bar-track"><div class="kpi-bar" id="kpi-pmho-bar"></div></div>
      </div>
      <div class="kpi-box" id="kpi-pca-box">
        <div class="kpi-label">PCA</div>
        <div class="kpi-value" id="kpi-pca">—</div>
        <div class="kpi-cible" id="kpi-pca-cible"></div>
        <div class="kpi-delta" id="kpi-pca-delta"></div>
        <div class="kpi-bar-track"><div class="kpi-bar" id="kpi-pca-bar"></div></div>
      </div>
    </div>

    <!-- Streak & propositions -->
    <div class="badges" id="badges"></div>

    <!-- Classement équipe -->
    <div class="card" id="team-section" style="display:none">
      <div class="team-title">EQUIPE — PCA aujourd'hui</div>
      <div id="team-list"></div>
    </div>

  </div>

  <!-- ── Onglet 2 : Historique ── -->
  <div id="tab-history" class="tab-content">
    <div class="chart-wrap">
      <div class="chart-title">PMHO — 365 jours</div>
      <canvas id="chart-pmho" height="180"></canvas>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">Taux PCA — 365 jours</div>
      <canvas id="chart-pca" height="180"></canvas>
    </div>
  </div>

  <!-- ── Navigation ── -->
  <nav>
    <button id="nav-today"   class="active" onclick="switchTab('today')">AUJOURD'HUI</button>
    <button id="nav-history"               onclick="switchTab('history')">HISTORIQUE</button>
  </nav>
</div>

<!-- ── Pop-up ── -->
<div id="popup-overlay">
  <div id="popup-card">
    <div id="popup-icon"></div>
    <div id="popup-msg"></div>
    <button id="popup-ok" onclick="closePopup()">OK</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
// Utilitaires Sheets
// ═══════════════════════════════════════════════════════════════════

// Convertit un numéro de série Excel en "YYYY-MM-DD" si nécessaire
function normalizeDate(v) {
  const n = Number(v);
  if (!isNaN(n) && n > 40000) {
    const d = new Date((n - 25569) * 86400 * 1000);
    return d.toISOString().slice(0, 10);
  }
  return String(v);
}

// Champs date à normaliser par feuille
const DATE_FIELDS = ['date'];

async function fetchSheet(range) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEETS_ID}/values/${encodeURIComponent(range)}?key=${CONFIG.API_KEY}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`Sheets API ${resp.status} pour ${range}`);
  const json = await resp.json();
  const rows = json.values || [];
  if (rows.length < 2) return [];
  const headers = rows[0];
  return rows.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = row[i] ?? ''; });
    // Normaliser tous les champs date (série Excel → ISO)
    DATE_FIELDS.forEach(f => { if (f in obj) obj[f] = normalizeDate(obj[f]); });
    return obj;
  });
}

function parseFloat2(v) {
  const f = parseFloat(v);
  return isNaN(f) ? null : f;
}
function parseInt2(v) {
  const i = parseInt(v);
  return isNaN(i) ? null : i;
}

// ═══════════════════════════════════════════════════════════════════
// Navigation onglets
// ═══════════════════════════════════════════════════════════════════

let historyInitialized = false;

function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  document.getElementById(`nav-${name}`).classList.add('active');
  if (name === 'history' && !historyInitialized && histData) {
    renderHistory();
    historyInitialized = true;
  }
}

// ═══════════════════════════════════════════════════════════════════
// Couleur signal
// ═══════════════════════════════════════════════════════════════════

function sigClass(value, cible) {
  if (value === null || cible === null || cible === 0) return 'sig-none';
  const ratio = value / cible;
  if (ratio >= 1)          return 'sig-green';
  if (ratio >= 0.9)        return 'sig-orange';
  return 'sig-red';
}
function sigEmoji(cls) {
  return { 'sig-green': '🟢', 'sig-orange': '🟡', 'sig-red': '🔴', 'sig-none': '' }[cls];
}

// ═══════════════════════════════════════════════════════════════════
// Formatage
// ═══════════════════════════════════════════════════════════════════

function fmtPMHO(v) {
  if (v === null) return '—';
  return v.toFixed(2).replace('.', ',') + ' €';
}
function fmtPct(v) {
  if (v === null) return '—';
  return Math.round(v * 100) + '%';
}
function fmtDate(iso) {
  if (!iso) return '—';
  const parts = iso.split('-');
  if (parts.length < 3) return iso;
  return `Données du ${parts[2]}/${parts[1]}`;
}

// ═══════════════════════════════════════════════════════════════════
// Pop-up gamification
// ═══════════════════════════════════════════════════════════════════

const POPUP_RULES = [
  { flag: r => r.record_PMHO === 'True',                   icon: '🏆', msg: 'Record perso PMHO !' },
  { flag: r => r.record_taux_PCA === 'True',               icon: '🏆', msg: 'Record perso PCA !' },
  { flag: r => parseInt2(r.streak_PCA) >= 7,               icon: '🔥', msg: '7 jours de suite au-dessus de la cible !' },
  { flag: r => parseInt2(r.streak_PCA) >= 3,               icon: '🔥', msg: '3 jours consécutifs !' },
  { flag: r => r.best_team_PCA === 'True',                  icon: '⭐', msg: 'Meilleur taux équipe aujourd\'hui !' },
  { flag: r => r.progression_PCA === 'True',               icon: '📈', msg: 'PCA en progression cette semaine !' },
  { flag: r => r.objectif_volume_atteint === 'True',       icon: '💼', msg: 'Objectif volume de propositions atteint !' },
  { flag: r => r.objectif_mensuel_PCA_atteint === 'True',  icon: '✅', msg: 'Objectif mensuel PCA atteint !' },
];

function maybeShowPopup(flagRow, todayStr) {
  const key = `mwps_popup_${opId}_${todayStr}`;
  if (localStorage.getItem(key)) return;

  for (const rule of POPUP_RULES) {
    if (flagRow && rule.flag(flagRow)) {
      document.getElementById('popup-icon').textContent = rule.icon;
      document.getElementById('popup-msg').textContent  = rule.msg;
      document.getElementById('popup-overlay').classList.add('show');
      localStorage.setItem(key, '1');
      return;
    }
  }
}

function closePopup() {
  document.getElementById('popup-overlay').classList.remove('show');
}

// ═══════════════════════════════════════════════════════════════════
// Onglet Aujourd'hui
// ═══════════════════════════════════════════════════════════════════

function renderToday(todayData, flagRow, targetRow, teamData) {
  const opInitials = CONFIG.OPERATORS[opId] || opId;
  const todayStr   = todayData ? todayData.date : '';

  document.getElementById('op-name').textContent = opInitials;
  document.getElementById('op-date').textContent = fmtDate(todayStr);

  // ── PMHO ──
  const pmho      = parseFloat2(todayData?.PMHO);
  const ciblePmho = parseFloat2(targetRow?.cible_PMHO);
  const pmhoCls   = sigClass(pmho, ciblePmho);

  const pmhoEl = document.getElementById('kpi-pmho');
  pmhoEl.textContent = fmtPMHO(pmho);
  pmhoEl.className = `kpi-value ${pmhoCls}`;
  document.getElementById('kpi-pmho-box').className = `kpi-box ${pmhoCls}`;
  document.getElementById('kpi-pmho-bar').style.width =
    (pmho !== null && ciblePmho !== null && ciblePmho > 0)
      ? Math.min(100, pmho / ciblePmho * 100) + '%' : '0%';

  document.getElementById('kpi-pmho-cible').textContent =
    ciblePmho !== null ? `Cible ${fmtPMHO(ciblePmho)}` : '';

  const pmhoDeltaEl = document.getElementById('kpi-pmho-delta');
  if (pmho !== null && ciblePmho !== null) {
    const delta = pmho - ciblePmho;
    pmhoDeltaEl.textContent = `${sigEmoji(pmhoCls)} ${delta >= 0 ? '+' : ''}${delta.toFixed(2).replace('.', ',')} €`;
    pmhoDeltaEl.className = `kpi-delta ${pmhoCls}`;
  } else {
    pmhoDeltaEl.textContent = '';
  }

  // ── PCA ──
  const taux      = parseFloat2(todayData?.taux_acceptation);
  const ciblePca  = parseFloat2(targetRow?.cible_taux_PCA);
  const pcaCls    = sigClass(taux, ciblePca);

  const pcaEl = document.getElementById('kpi-pca');
  pcaEl.textContent = fmtPct(taux);
  pcaEl.className = `kpi-value ${pcaCls}`;
  document.getElementById('kpi-pca-box').className = `kpi-box ${pcaCls}`;
  document.getElementById('kpi-pca-bar').style.width =
    (taux !== null && ciblePca !== null && ciblePca > 0)
      ? Math.min(100, taux / ciblePca * 100) + '%' : '0%';

  document.getElementById('kpi-pca-cible').textContent =
    ciblePca !== null ? `Cible ${fmtPct(ciblePca)}` : '';

  const pcaDeltaEl = document.getElementById('kpi-pca-delta');
  if (taux !== null && ciblePca !== null) {
    const same = Math.abs(taux - ciblePca) < 0.005;
    pcaDeltaEl.textContent = `${sigEmoji(pcaCls)} ${same ? '=' : (taux >= ciblePca ? '+' : '') + Math.round((taux - ciblePca) * 100) + ' pts'}`;
    pcaDeltaEl.className = `kpi-delta ${pcaCls}`;
  } else {
    pcaDeltaEl.textContent = '';
  }

  // ── Badges streak / propositions ──
  const badgesEl  = document.getElementById('badges');
  const fragments = [];

  const streakPca = parseInt2(flagRow?.streak_PCA);
  if (streakPca && streakPca > 0) {
    const icon = streakPca >= 3 ? '🔥' : '✨';
    fragments.push(`<div class="badge-row badge-streak">${icon} Streak PCA : ${streakPca} jour${streakPca > 1 ? 's' : ''}</div>`);
  }

  const nbPca = parseInt2(todayData?.nb_PCA) ?? 0;
  const nbPcr = parseInt2(todayData?.nb_PCR) ?? 0;
  const volJ  = nbPca + nbPcr;
  const cibleVol = parseInt2(targetRow?.cible_nb_propositions_j);
  if (cibleVol !== null && cibleVol > 0) {
    const volCls = volJ >= cibleVol ? 'sig-green' : (volJ >= cibleVol * 0.9 ? 'sig-orange' : 'sig-red');
    const volBadgeCls = volCls.replace('sig-', 'badge-vol-');
    fragments.push(`<div class="badge-row ${volBadgeCls}">💼 Propositions : <span class="${volCls}">${volJ}/${cibleVol}</span></div>`);
  } else if (volJ > 0) {
    fragments.push(`<div class="badge-row">💼 Propositions : ${volJ}</div>`);
  }

  badgesEl.innerHTML = fragments.join('');

  // ── Classement équipe ──
  renderTeam(teamData, todayStr, opId, flagRow);

  // ── Pop-up ──
  maybeShowPopup(flagRow, todayStr);
}

function renderTeam(teamData, todayStr, currentOpId, flagRow) {
  const section  = document.getElementById('team-section');
  const listEl   = document.getElementById('team-list');
  const todayOps = teamData.filter(r => r.date === todayStr);

  const workers  = todayOps.filter(r => parseInt2(r.nb_ventes_comptoir_j) > 0);
  if (workers.length <= 1) { section.style.display = 'none'; return; }

  const withTaux = workers.filter(r => parseFloat2(r.taux_acceptation) !== null);
  const noTaux   = workers.filter(r => parseFloat2(r.taux_acceptation) === null);

  withTaux.sort((a, b) => parseFloat2(b.taux_acceptation) - parseFloat2(a.taux_acceptation));
  const sorted = [...withTaux, ...noTaux];

  const ciblePca = parseFloat2(flagRow?.cible_j_PCA);

  const BAR_COLORS = { 'sig-green': '#22c55e', 'sig-orange': '#f59e0b', 'sig-red': '#ef4444', 'sig-none': '#8b8fa8' };

  let html = '';
  sorted.forEach((row, i) => {
    const opInit  = CONFIG.OPERATORS[row.operateur_id] || row.operateur_id;
    const taux    = parseFloat2(row.taux_acceptation);
    const cls     = taux !== null ? sigClass(taux, ciblePca) : 'sig-none';
    const isSelf  = row.operateur_id === currentOpId;
    const barW    = taux !== null ? Math.round(taux * 100) : 0;
    const barCol  = BAR_COLORS[cls];
    html += `<div class="team-row${isSelf ? '" style="font-weight:800' : ''}">
      <span class="team-rank">${i + 1}.</span>
      <span class="team-op">${opInit}</span>
      <span class="team-val ${cls}">${fmtPct(taux)}</span>
      <span class="team-bar-wrap"><span class="team-bar-fill" style="width:${barW}%;background:${barCol}"></span></span>
      <span class="team-sig">${sigEmoji(cls)}</span>
    </div>`;
  });

  listEl.innerHTML = html;
  section.style.display = 'block';
}

// ═══════════════════════════════════════════════════════════════════
// Onglet Historique
// ═══════════════════════════════════════════════════════════════════

let histData    = null;
let histTargets = null;
let chartPmho   = null;
let chartPca    = null;

function renderHistory() {
  if (!histData) return;

  const cutoff  = new Date();
  cutoff.setDate(cutoff.getDate() - 365);
  const cutStr  = cutoff.toISOString().slice(0, 10);

  const rows = histData
    .filter(r => r.operateur_id === opId && r.date >= cutStr && parseInt2(r.nb_ventes_comptoir_j) > 0)
    .sort((a, b) => a.date.localeCompare(b.date));

  const labels  = rows.map(r => r.date);
  const pmhoVals = rows.map(r => parseFloat2(r.PMHO));
  const pcaVals  = rows.map(r => parseFloat2(r.taux_acceptation));

  // Construire la cible glissante par date (lire depuis targets par mois)
  function targetForDate(dateStr, kpi) {
    if (!histTargets) return null;
    const ym = dateStr.slice(0, 7);
    const t  = histTargets.find(r => r.annee_mois === ym && String(r.operateur_id) === String(opId));
    if (!t) return null;
    return kpi === 'pmho' ? parseFloat2(t.cible_PMHO) : parseFloat2(t.cible_taux_PCA);
  }

  function colorForPoint(v, cible) {
    if (v === null || cible === null || cible === 0) return 'rgba(139,143,168,0.7)';
    if (v >= cible)        return '#22c55e';
    if (v >= cible * 0.9)  return '#f59e0b';
    return '#ef4444';
  }

  function makeChart(canvasId, labels, mainVals, cibleVals, labelMain, labelCible, fmtY) {
    const ctx = document.getElementById(canvasId).getContext('2d');
    const pointColors = mainVals.map((v, i) => colorForPoint(v, cibleVals[i]));

    return new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: labelMain,
            data: mainVals,
            borderColor: pointColors,
            backgroundColor: 'transparent',
            pointBackgroundColor: pointColors,
            pointRadius: 2,
            pointHoverRadius: 5,
            borderWidth: 2,
            tension: 0.3,
            segment: {
              borderColor: ctx2 => colorForPoint(mainVals[ctx2.p0DataIndex], cibleVals[ctx2.p0DataIndex]),
            },
            spanGaps: false,
          },
          {
            label: labelCible,
            data: cibleVals,
            borderColor: 'rgba(139,143,168,0.5)',
            borderDash: [5, 4],
            pointRadius: 0,
            borderWidth: 1.5,
            tension: 0,
            spanGaps: true,
          },
        ],
      },
      options: {
        responsive: true,
        animation: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1c1f26',
            titleColor: '#8b8fa8',
            bodyColor: '#f0f0f0',
            callbacks: {
              label: item => `${item.dataset.label}: ${fmtY(item.raw)}`,
            },
          },
        },
        scales: {
          x: {
            type: 'category',
            ticks: {
              color: '#8b8fa8',
              maxTicksLimit: 8,
              font: { size: 10 },
              maxRotation: 0,
            },
            grid: { color: '#2a2d36' },
          },
          y: {
            ticks: {
              color: '#8b8fa8',
              font: { size: 10 },
              callback: v => fmtY(v),
            },
            grid: { color: '#2a2d36' },
          },
        },
      },
    });
  }

  const pmhoCibles = labels.map(d => targetForDate(d, 'pmho'));
  const pcaCibles  = labels.map(d => targetForDate(d, 'pca'));

  if (chartPmho) chartPmho.destroy();
  if (chartPca)  chartPca.destroy();

  chartPmho = makeChart('chart-pmho', labels, pmhoVals, pmhoCibles, 'PMHO',    'Cible', v => v !== null ? v.toFixed(2) + ' €' : '—');
  chartPca  = makeChart('chart-pca',  labels, pcaVals,  pcaCibles,  'Taux PCA','Cible', v => v !== null ? Math.round(v * 100) + '%' : '—');
}

// ═══════════════════════════════════════════════════════════════════
// Bootstrap principal
// ═══════════════════════════════════════════════════════════════════

const _urlOp = new URLSearchParams(window.location.search).get('op');
if (!_urlOp) {
  const saved = localStorage.getItem('mwps_last_op');
  if (saved && CONFIG.OPERATORS[saved]) {
    window.location.replace('?op=' + saved);
    // Arrêter l'exécution — la page va recharger
    throw new Error('redirect');
  }
}
const opId = _urlOp || '1';

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

async function init() {
  if (!CONFIG.OPERATORS[opId]) {
    showError(`Opérateur inconnu : ?op=${opId}`);
    return;
  }

  try {
    // Lecture parallèle : data (une seule fois) + flags + targets
    const [dataAll, flagsAll, targetsAll] = await Promise.all([
      fetchSheet('data!A:H'),
      fetchSheet('flags!A:P'),
      fetchSheet('targets!A:G'),
    ]);

    // Dernier jour travaillé = date la plus récente où nb_ventes_comptoir_j > 0
    const opRows = dataAll
      .filter(r => r.operateur_id === opId && parseInt2(r.nb_ventes_comptoir_j) > 0);
    opRows.sort((a, b) => b.date.localeCompare(a.date));
    const todayStr   = opRows[0]?.date ?? '';
    const todayData  = opRows[0] ?? null;

    // Flag row : ligne la plus récente pour cet opérateur (indépendant de todayStr)
    const opFlags = flagsAll.filter(r => r.operateur_id === opId);
    opFlags.sort((a, b) => b.date.localeCompare(a.date));
    const flagRow = opFlags.filter(r => r.date === todayStr)[0] ?? opFlags[0] ?? null;

    // Normalisation annee_mois : numéro de série Excel → "YYYY-MM"
    function excelSerialToYearMonth(serial) {
      const d = new Date((serial - 25569) * 86400 * 1000);
      const y = d.getUTCFullYear();
      const m = String(d.getUTCMonth() + 1).padStart(2, '0');
      return `${y}-${m}`;
    }
    function normalizeYearMonth(v) {
      const n = Number(v);
      if (!isNaN(n) && n > 40000) return excelSerialToYearMonth(n);
      return v; // déjà une string "YYYY-MM"
    }
    targetsAll.forEach(r => { r.annee_mois = normalizeYearMonth(r.annee_mois); });

    // Target row du mois courant
    const ym = todayStr.slice(0, 7);
    const targetRow = targetsAll.find(r => String(r.operateur_id) === String(opId) && r.annee_mois === ym) ?? null;

    // Historique pour onglet 2
    histData    = dataAll;
    histTargets = targetsAll;

    // Persister l'opérateur courant
    localStorage.setItem('mwps_last_op', opId);

    // Afficher
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('tab-today').classList.add('active');

    renderToday(todayData, flagRow, targetRow, dataAll);

  } catch (err) {
    showError('Données indisponibles — ' + err.message);
  }
}

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js').catch(() => {});
}

init();
</script>
